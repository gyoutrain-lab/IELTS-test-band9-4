<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Proficiency Certification Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .cert-box { border: 8px double #0d6efd; padding: 40px; background: #fff; }
        .score-display { font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body class="bg-light p-4">

    <!-- Registration Screen -->
    <div id="login" class="container bg-white p-5 shadow rounded" style="max-width: 600px;">
        <h2 class="text-primary mb-4">Candidate Registration</h2>
        <input type="text" id="name" class="form-control mb-3" placeholder="Full Legal Name">
        <input type="text" id="regId" class="form-control mb-3" placeholder="Registration ID (e.g. STR/SCFHS)">
        <button onclick="start()" class="btn btn-primary w-100">Begin Formal Assessment</button>
    </div>

    <!-- Exam Screen -->
    <div id="test-stage" class="container bg-white p-5 shadow rounded" style="max-width: 900px; display:none;">
        <h4 id="competency-title" class="text-secondary"></h4>
        <div class="progress mb-4"><div id="progressBar" class="progress-bar" style="width: 0%;"></div></div>
        <div id="input-area" class="my-4"></div>
        <button id="submit-btn" onclick="submit()" class="btn btn-dark w-100">Submit Response</button>
    </div>

    <script>
        const examData = [
            { id: "writing", title: "Writing: Clinical Reporting", type: "text", 
              prompt: "Baseline: 'The patient's BP is going up fast.'", 
              target: ["observation", "escalation", "systolic", "blood", "pressure"], minWords: 8 },
            { id: "reading", title: "Reading: NPSG Compliance", type: "radio", 
              prompt: "Which action best mitigates patient fall risk?", 
              options: ["Manual restraint", "Implementation of fall-risk assessment protocols", "Constant supervision"], correct: "Implementation of fall-risk assessment protocols" },
            { id: "speaking", title: "Speaking: SBAR Handover", type: "text", 
              prompt: "Convert: 'I am telling you the meds are finished.' into professional SBAR syntax.", 
              target: ["medication", "administration", "completion", "protocol"], minWords: 8 }
        ];

        let cur = 0, scores = {writing:0, reading:0, speaking:0}, name = "", regId = "";

        function start() {
            name = document.getElementById('name').value;
            regId = document.getElementById('regId').value;
            if(!name || !regId) return alert("All fields are required.");
            document.getElementById('login').style.display = 'none';
            document.getElementById('test-stage').style.display = 'block';
            renderStage();
        }

        function renderStage() {
            let stage = examData[cur];
            document.getElementById('competency-title').innerText = stage.title;
            let area = document.getElementById('input-area');
            area.innerHTML = `<p class="lead">${stage.prompt}</p>`;
            
            if(stage.type === 'text') area.innerHTML += `<textarea id="ans" class="form-control" rows="4"></textarea>`;
            else area.innerHTML += stage.options.map(o => `<div class="form-check"><input class="form-check-input" type="radio" name="r" value="${o}"> ${o}</div>`).join('');
            document.getElementById('progressBar').style.width = (cur / examData.length * 100) + "%";
        }

        function submit() {
            let stage = examData[cur];
            let score = 0;

            if(stage.type === 'text') {
                let input = document.getElementById('ans').value.trim();
                let words = input.split(' ');
                if(words.length < stage.minWords) {
                    alert("Response too brief. Professional reporting requires more detail.");
                    return;
                }
                // Scoring: Terminology density check
                let hits = stage.target.filter(w => input.toLowerCase().includes(w)).length;
                score = Math.min(9, (hits / stage.target.length) * 10);
            } else {
                let val = document.querySelector('input[name="r"]:checked')?.value;
                score = (val === stage.correct) ? 9 : 0;
            }
            
            scores[stage.id] = score;
            cur++;
            if(cur < examData.length) renderStage();
            else finalize();
        }

        function finalize() {
            let avg = (Object.values(scores).reduce((a,b)=>a+b, 0) / examData.length).toFixed(1);
            document.body.innerHTML = `
                <div class="container cert-box shadow mt-5">
                    <h1 class="text-center">PROFICIENCY CERTIFICATE</h1>
                    <div class="p-4">
                        <p><strong>Candidate:</strong> ${name}</p>
                        <p><strong>Reg ID:</strong> ${regId}</p>
                        <hr>
                        <p><strong>Cumulative Band Score:</strong> <span class="score-display">${avg}</span></p>
                        <p><em>Verified for clinical linguistic standards.</em></p>
                    </div>
                    <button onclick="window.print()" class="btn btn-outline-dark w-100">Print Official Record</button>
                </div>`;
        }
    </script>
</body>
</html>
