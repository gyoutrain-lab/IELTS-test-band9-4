<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Proficiency Certification Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .cert-box { border: 12px double #000; padding: 50px; background: #fff; }
        .score-display { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body class="bg-light p-4">

    <div id="main-app" class="container bg-white p-5 shadow rounded" style="max-width: 900px;">
        <h2 id="header">Candidate Authentication</h2>
        <div id="content">
            <input type="text" id="name" class="form-control mb-3" placeholder="Full Legal Name">
            <input type="text" id="id" class="form-control mb-3" placeholder="Registration ID">
            <button onclick="begin()" class="btn btn-dark w-100">Initialize Formal Assessment</button>
        </div>
    </div>

    <script>
        // FIXED: Added "type" key to all modules
        const exam = [
            { id: "writing", title: "Writing: Clinical Reporting", type: "text", prompt: "Baseline: 'The patient's BP is going up fast.'", target: ["escalation", "systolic", "pressure", "observation"], minWords: 10 },
            { id: "reading", title: "Reading: NPSG Compliance", type: "radio", prompt: "Which is the primary goal of environmental hazard mitigation?", options: ["Cost reduction", "Adverse event prevention", "Staff convenience"], correct: "Adverse event prevention" }
        ];

        let cur = 0, scores = {}, name = "", regId = "";

        function calculateAdvancedScore(input, stage) {
            let score = 0;
            const lowerInput = input.toLowerCase();
            if (/tion|ment|ance|ence/i.test(lowerInput)) score += 4.0;
            if (/^(clinical|regarding|subsequent|initial|immediate)/i.test(lowerInput)) score += 3.0;
            const hits = stage.target.filter(w => lowerInput.includes(w)).length;
            score += (hits / stage.target.length) * 2.0;
            return Math.min(9.0, score);
        }

        function begin() {
            name = document.getElementById('name').value;
            regId = document.getElementById('id').value;
            if(!name || !regId) return alert("Registration required.");
            render();
        }

        function render() {
            let stage = exam[cur];
            document.getElementById('header').innerText = stage.title;
            // Logic to handle different types
            let inputField = stage.type === 'radio' 
                ? stage.options.map(o => `<div class="form-check"><input class="form-check-input" type="radio" name="opt" value="${o}"> ${o}</div>`).join('') 
                : '<textarea id="ans" class="form-control mb-3" rows="4"></textarea>';

            document.getElementById('content').innerHTML = `
                <p class="lead">${stage.prompt}</p>
                ${inputField}
                <button onclick="next()" class="btn btn-primary w-100">Submit Competency</button>
            `;
        }

        function next() {
            let stage = exam[cur];
            let score = 0;
            if(stage.type === 'radio') {
                let selected = document.querySelector('input[name="opt"]:checked');
                if(!selected) return alert("Please select an option.");
                score = (selected.value === stage.correct) ? 9 : 0;
            } else {
                let input = document.getElementById('ans').value;
                if(input.split(' ').length < stage.minWords) return alert("Response too brief.");
                score = calculateAdvancedScore(input, stage);
            }
            scores[stage.id] = score;
            cur++;
            cur < exam.length ? render() : finish();
        }

        function finish() {
            let avg = (Object.values(scores).reduce((a,b)=>a+b,0)/exam.length).toFixed(1);
            document.getElementById('header').innerText = "Assessment Finalized";
            document.getElementById('content').innerHTML = `
                <div class="cert-box text-center">
                    <h1>CERTIFICATE OF PROFICIENCY</h1>
                    <p>Candidate: <strong>${name}</strong> (${regId})</p>
                    <div class="score-display">${avg}</div>
                    <canvas id="chart" class="mt-4"></canvas>
                    <button onclick="window.print()" class="btn btn-dark mt-4">Print Official Record</button>
                </div>
            `;
            new Chart(document.getElementById('chart'), { type: 'radar', data: { labels: Object.keys(scores), datasets: [{ data: Object.values(scores), label: 'Band Score' }] } });
        }
    </script>
</body>
</html>
